apiVersion: apps/v1
kind: Deployment
metadata:
  name: alphatheta-backend
  labels:
    app: alphatheta
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: alphatheta
      component: backend
  template:
    metadata:
      labels:
        app: alphatheta
        component: backend
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: backend
          image: alphatheta-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: alphatheta-config
            - secretRef:
                name: alphatheta-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
---
apiVersion: v1
kind: Service
metadata:
  name: alphatheta-backend
spec:
  type: ClusterIP
  selector:
    app: alphatheta
    component: backend
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alphatheta-config
data:
  ENV_MODE: "paper"
  LOG_LEVEL: "INFO"
  CORS_ORIGINS: "https://alphatheta.example.com"
  PROMETHEUS_ENABLED: "true"
  NTP_SERVER: "pool.ntp.org"
  OTEL_SERVICE_NAME: "alphatheta-backend"
