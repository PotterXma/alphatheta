<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AlphaTheta · 访客统计</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #0a0f1e;
            --surface: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --cyan: #22d3ee;
            --green: #34d399;
            --red: #f43f5e;
            --text: #f1f5f9;
            --muted: #64748b;
            --mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(34, 211, 238, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(59, 130, 246, 0.05) 0%, transparent 55%);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 6px;
            background: linear-gradient(135deg, var(--cyan), #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.8rem;
            margin-bottom: 24px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            backdrop-filter: blur(16px);
        }

        .card-label {
            font-size: 0.7rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .card-value {
            font-family: var(--mono);
            font-size: 1.8rem;
            font-weight: 700;
            margin-top: 4px;
        }

        .card-value.cyan {
            color: var(--cyan);
        }

        .card-value.green {
            color: var(--green);
        }

        .section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 18px;
            backdrop-filter: blur(16px);
        }

        .section h2 {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 14px;
            color: var(--cyan);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            font-size: 0.68rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
        }

        td {
            font-family: var(--mono);
            font-size: 0.82rem;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .bar {
            height: 6px;
            border-radius: 3px;
            background: var(--cyan);
            min-width: 4px;
            transition: width 0.5s;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--muted);
        }

        .refresh-btn {
            padding: 6px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(34, 211, 238, 0.1);
            color: var(--cyan);
            font-size: 0.78rem;
            cursor: pointer;
            float: right;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: rgba(34, 211, 238, 0.2);
        }

        .tag-external {
            color: var(--green);
        }

        .tag-internal {
            color: var(--muted);
        }

        .geo-info {
            font-family: 'Inter', sans-serif;
            font-size: 0.76rem;
            color: var(--text);
        }

        .geo-detail {
            font-size: 0.68rem;
            color: var(--muted);
            margin-top: 2px;
        }

        .daily-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 4px 0;
        }

        .daily-label {
            font-family: var(--mono);
            font-size: 0.8rem;
            width: 100px;
            color: var(--muted);
        }

        .daily-bar {
            flex: 1;
        }

        .daily-val {
            font-family: var(--mono);
            font-size: 0.8rem;
            width: 40px;
            text-align: right;
        }
    </style>
</head>

<body>
    <div class="container">
        <button class="refresh-btn" onclick="load()">🔄 刷新</button>
        <h1>📊 AlphaTheta 访客统计</h1>
        <div class="subtitle" id="genTime">加载中...</div>

        <div class="cards">
            <div class="card">
                <div class="card-label">独立 IP 总数</div>
                <div class="card-value cyan" id="totalIps">--</div>
            </div>
            <div class="card">
                <div class="card-label">总请求数</div>
                <div class="card-value" id="totalHits">--</div>
            </div>
            <div class="card">
                <div class="card-label">今日 UV</div>
                <div class="card-value green" id="todayUv">--</div>
            </div>
            <div class="card">
                <div class="card-label">外网 IP</div>
                <div class="card-value" id="extIps">--</div>
            </div>
        </div>

        <!-- 7日UV -->
        <div class="section">
            <h2>📅 最近 7 天 UV 趋势</h2>
            <div id="dailyChart"></div>
        </div>

        <!-- IP 列表 -->
        <div class="section">
            <h2>🌐 所有访客 IP</h2>
            <table>
                <thead>
                    <tr>
                        <th>IP 地址</th>
                        <th>类型</th>
                        <th>地理位置</th>
                        <th>最后访问</th>
                    </tr>
                </thead>
                <tbody id="ipTable"></tbody>
            </table>
        </div>

        <!-- 路径热度 -->
        <div class="section">
            <h2>🔥 路径热度 Top 20</h2>
            <table>
                <thead>
                    <tr>
                        <th>路径</th>
                        <th>请求数</th>
                        <th>占比</th>
                    </tr>
                </thead>
                <tbody id="pathTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        const PRIVATE_RE = /^(10\.|172\.(1[6-9]|2[0-9]|3[01])\.|192\.168\.|127\.|::1)/;

        async function load() {
            try {
                const resp = await fetch('/api/v1/admin/visitor-stats');
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const d = await resp.json();
                render(d);
            } catch (e) {
                document.getElementById('genTime').textContent = '❌ 加载失败: ' + e.message;
            }
        }

        function render(d) {
            document.getElementById('genTime').textContent = `更新于 ${d.generated_at}`;
            document.getElementById('totalIps').textContent = d.total_unique_ips;
            document.getElementById('totalHits').textContent = d.total_hits.toLocaleString();
            document.getElementById('todayUv').textContent = d.today_uv;
            document.getElementById('extIps').textContent = d.external_ip_count;

            // Daily UV chart
            const days = Object.entries(d.daily_uv).sort((a, b) => a[0].localeCompare(b[0]));
            const maxUv = Math.max(...days.map(x => x[1]), 1);
            document.getElementById('dailyChart').innerHTML = days.map(([day, uv]) => `
        <div class="daily-row">
          <span class="daily-label">${day.slice(5)}</span>
          <div class="daily-bar"><div class="bar" style="width:${(uv / maxUv) * 100}%"></div></div>
          <span class="daily-val">${uv}</span>
        </div>
      `).join('');

            // IP table
            document.getElementById('ipTable').innerHTML = d.ips.map(ip => {
                const isPrivate = ip.is_private;
                const geo = ip.geo;
                let geoHtml = '<span class="tag-internal">—</span>';
                if (geo) {
                    const loc = [geo.country, geo.region, geo.city].filter(Boolean).join(' · ');
                    const isp = geo.isp || geo.org || '';
                    geoHtml = `<div class="geo-info">${loc}</div>${isp ? `<div class="geo-detail">${isp}</div>` : ''}`;
                }
                return `<tr>
          <td>${ip.ip}</td>
          <td class="${isPrivate ? 'tag-internal' : 'tag-external'}">${isPrivate ? '内网' : '外网'}</td>
          <td>${geoHtml}</td>
          <td>${ip.last_seen}</td>
        </tr>`;
            }).join('');

            // Path table
            const totalPathHits = d.top_paths.reduce((s, p) => s + p.hits, 0) || 1;
            document.getElementById('pathTable').innerHTML = d.top_paths.map(p => `
        <tr>
          <td>${p.path}</td>
          <td>${p.hits}</td>
          <td>${(p.hits / totalPathHits * 100).toFixed(1)}%</td>
        </tr>
      `).join('');
        }

        load();
        // 自动刷新: 每 30 秒
        setInterval(load, 30000);
    </script>
</body>

</html>
